[extend]

# Allow known public/publishable keys — intentionally in client code
[allowlist]
  description = "QC allowlist — publicly safe keys"
  regexes = [
    # Supabase publishable anon key — intentionally public, protected by RLS
    '''sb_publishable_[A-Za-z0-9_\-]+''',
    # PostHog public project key — intentionally public analytics key
    '''phc_[A-Za-z0-9_\-]+''',
  ]
